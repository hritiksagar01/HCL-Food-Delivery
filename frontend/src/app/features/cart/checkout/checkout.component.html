<div class="checkout-page">
      <h1>Complete Your Order</h1>

      <div class="empty-state" *ngIf="cartService.cartItems().length === 0">
            <p>Your cart is empty. Nothing to checkout.</p>
            <a routerLink="/" style="color: #55b351; font-weight: 500;">Go back to menu</a>
      </div>

      <div class="checkout-container" *ngIf="cartService.cartItems().length > 0">

            <div class="order-summary">
                  <p>Total to Pay ({{ cartService.cartCount() }} items)</p>
                  <h2>${{ cartService.cartTotal() | number:'1.2-2' }}</h2>
            </div>

            <div class="form-group">
                  <label>Delivery Address</label>
                  <textarea rows="3"
                        placeholder="Enter your full street address, apartment number, and zip code"></textarea>
            </div>

            <div class="form-group">
                  <label>Payment Method</label>
                  <select>
                        <option>Credit / Debit Card</option>
                        <option>Cash on Delivery</option>
                        <option>Digital Wallet</option>
                  </select>
            </div>

            <div class="form-group">
                  <label>Special Instructions (Optional)</label>
                  <input type="text" placeholder="e.g. Leave at the front door"
                        style="width: 100%; padding: 14px 16px; border: 1px solid #e0e0e0; border-radius: 6px; outline: none; transition: border-color 0.2s;">
            </div>

            <button class="btn-place-order" (click)="placeOrder()" [disabled]="isProcessing">
                  {{ isProcessing ? 'Processing Payment...' : 'Confirm & Place Order' }}
            </button>
      </div>
</div>
