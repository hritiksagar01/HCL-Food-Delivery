<div class="login-modal">
      <div class="login-form-container">
            <div class="brand">Urbee</div>

            <h1>Welcome Back</h1>
            <div class="subtitle">Sign in with your email address and Password.</div>

            <div class="form-group">
                  <label>Email Address</label>
                  <div class="input-wrapper">
                        <input type="email" #emailInput placeholder="johndoe123@xyz.com" value="admin@demo.com">
                        <div class="success-icon" *ngIf="emailInput.value.length > 3">✓</div>
                  </div>
            </div>

            <div class="form-group">
                  <label>Password</label>
                  <div class="input-wrapper">
                        <input type="password" placeholder="•••••••••" value="password123">
                  </div>
            </div>

            <div class="form-options">
                  <label class="remember">
                        <input type="checkbox" checked>
                        Remember me
                  </label>
                  <a href="#" class="forgot" (click)="$event.preventDefault()">Forgot Password?</a>
            </div>

            <button class="btn-submit" (click)="onLogin(emailInput.value)">Sign In</button>

            <div class="signup-link">
                  Don't have an account? <a href="#" (click)="$event.preventDefault()">Sign Up</a>
            </div>
      </div>

      <div class="login-image-container">
            <img src="bg-login.png" alt="Fresh Food Spread">
      </div>
</div>
