<div class="order-history-page">
      <h1>Order History</h1>

      <div class="empty-state" *ngIf="orders().length === 0">
            <p>You haven't placed any orders with us yet.</p>
      </div>

      <div class="table-container" *ngIf="orders().length > 0">
            <table>
                  <thead>
                        <tr>
                              <th>Order ID</th>
                              <th>Date Placed</th>
                              <th>Total Amount</th>
                              <th>Status</th>
                        </tr>
                  </thead>
                  <tbody>
                        <tr *ngFor="let order of orders()">
                              <td class="order-id">#{{ order.id }}</td>
                              <td>{{ order.createdAt | date:'mediumDate' }} at {{ order.createdAt | date:'shortTime' }}
                              </td>
                              <td class="amount">${{ order.totalAmount | number:'1.2-2' }}</td>
                              <td>
                                    <span class="status-pill" [ngClass]="order.status.toLowerCase()">
                                          {{ order.status }}
                                    </span>
                              </td>
                        </tr>
                  </tbody>
            </table>
      </div>
</div>
